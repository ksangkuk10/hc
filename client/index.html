<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>HealthCare Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css?family=Space+Grotesk:500,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      font-family: 'Space Grotesk', 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #131f2b 0%, #244d61 80%, #25b3b3 100%);
      color: #f4f5f7;
      display: flex;
      flex-direction: column;
    }
    #container {
      display: flex;
      height: 100vh;
    }
    aside {
      width: 210px;
      background: rgba(21,28,41,0.96);
      padding-top: 34px;
      box-shadow: 5px 0 20px #191e2644;
      display: flex; flex-direction: column; align-items: stretch;
    }
    .logo {
      font-size: 1.32rem; font-weight: bold; margin-bottom: 37px; color: #3af2cf;
      letter-spacing: 2px; text-align:center; padding:0 18px;
    }
    nav {
      display: flex; flex-direction: column; gap: 8px;
    }
    nav button {
      background: none;
      color: #c8fae8;
      border: none;
      font-size: 1.12rem;
      text-align: left;
      padding: 13px 18px;
      border-radius: 14px 4px 4px 14px;
      cursor: pointer;
      transition: background 0.17s, color 0.13s, font-weight 0.08s;
      display: flex; align-items: center; gap:12px;
    }
    nav button:hover, nav .active {
      background:linear-gradient(90deg,#25b3b3 65%,#3af2cfcc 100%);
      color: #13262b;
      font-weight: bold;
    }
    .fa { min-width:22px; }
    .main-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 7vw 0;
      min-height: 44px;
    }
    #header-profile { font-size: 0.95rem; color: #a8e8d8; }
    .hp-name { margin-right: 8px; }
    .hp-btn {
      background: rgba(36,77,97,0.9);
      border: 1px solid #22d6b1;
      color: #3af2cf;
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 1.1rem;
    }
    .hp-btn:hover { opacity: 0.88; }
    main {
      flex:1;
      padding: 12px 7vw 28px 7vw;
      display: flex; flex-direction: column; align-items : stretch;
      overflow-y:auto;
      min-width: 0;
    }
    h2 {margin:14px 0 6px 0; color:#25b3b3; letter-spacing:1.3px;}
    .card {
      background: rgba(36,77,97,0.95);
      border-radius: 18px;
      box-shadow: 0px 4px 18px #11b8a62a;
      padding: 24px 22px;
      margin-bottom: 16px;
      font-size:1.08rem;color:#c7e9e6;
    }
    /* 로그인폼 Overlay */
    #login-modal {
      position:fixed;left:0;top:0;width:100vw;height:100vh;z-index:99;
      display:flex;align-items:center;justify-content:center;
      background:rgba(15,17,23,0.91);
      color:#13b3bc;
    }
    .login-card {
      background:rgba(19,31,43,0.97);border-radius:20px;padding:42px 34px 36px 34px;box-shadow:0 6px 32px #14e6a322;text-align:center;width:340px;max-width:94vw;
    }
    .login-card input{
      width:88%;font-size:1.1rem;border-radius:7px;padding:12px 10px;margin-bottom:14px;border:1.5px solid #22d6b1;background:#183857;color:#a8fff9;
    }
    .login-card button{
      font-size:1.1rem;background:linear-gradient(90deg,#1debe7,#2fdca4 95%);color:#154954;
      border:none;border-radius:7px;padding:11px 0;width:91%;margin-bottom:8px;margin-top:4px;cursor:pointer;font-weight:bold;box-shadow:0 0 8px #18c1a722;
      transition:opacity .12s;
    }
    .login-card button:hover{opacity:.83;}
    .login-tabs { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
    .login-tabs button {
      flex: 1;
      background: rgba(36,77,97,0.6);
      color: #8ec;
      border: 1px solid #2a8;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    .login-tabs button.active {
      background: linear-gradient(90deg,#25b3b3 65%,#3af2cfcc 100%);
      color: #13262b;
      border-color: #3af2cf;
    }
    .muted { color: #8db8b0; }
    .small { font-size: 0.92rem; }
    .section-label { font-size: 1.05rem; font-weight: bold; margin-bottom: 12px; color: #3af2cf; }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-bottom: 14px; }
    .dash-grid.two { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .goal-row { margin-bottom: 14px; }
    .goal-title { font-weight: 600; margin-bottom: 4px; }
    .goal-meta { font-size: 0.85rem; color: #9ec; margin-top: 4px; }
    .progress-outer { height: 10px; background: #183857; border-radius: 6px; overflow: hidden; }
    .progress-inner { height: 100%; background: linear-gradient(90deg,#1debe7,#2fdca4); border-radius: 6px; transition: width 0.2s; }
    .rem-item { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .rem-time { color: #f0c040; margin-right: 8px; font-weight: 600; }
    .quick-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .qa {
      padding: 12px 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      background: linear-gradient(90deg,#1a5c6e,#25b3b3);
      color: #e8fffa;
      font-size: 0.98rem;
    }
    .qa:hover { opacity: 0.92; }
    .form-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    .form-table td:first-child { width: 140px; color: #a8f5e0; }
    .form-table input {
      width: 100px;
      padding: 7px 10px;
      border-radius: 7px;
      border: 1.5px solid #22d6b1;
      background: #183857;
      color: #a8fff9;
      font-size: 1rem;
    }
    .form-table input.wide { width: 100%; max-width: 320px; box-sizing: border-box; }
    .btn-primary {
      margin-top: 16px;
      padding: 10px 28px;
      background: linear-gradient(90deg,#1debe7,#2fdca4);
      color: #154954;
      border: none;
      border-radius: 8px;
      font-size: 1.02rem;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      margin-top: 10px;
      padding: 8px 20px;
      background: rgba(36,77,97,0.95);
      color: #a8fff9;
      border: 1px solid #22d6b1;
      border-radius: 8px;
      cursor: pointer;
    }
    .hist-list { list-style: none; padding: 0; margin: 0; }
    .hist-list li { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .answer { margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px; }
    select, textarea.wide, input.wide {
      width: 100%; max-width: 420px; box-sizing: border-box;
      padding: 10px;
      border-radius: 8px;
      border: 1.5px solid #22d6b1;
      background: #183857;
      color: #e8fffa;
      margin-bottom: 10px;
      font-family: inherit;
    }
    textarea { min-height: 100px; resize: vertical; }
    label { display: block; margin-top: 8px; margin-bottom: 4px; color: #a8e8d8; }
    .nav-logout {
      margin-top: 17px;
      background: linear-gradient(90deg,#2fdca4,#c45c6e) !important;
      color: #1a2c33 !important;
    }
    @media(max-width:810px){#container{flex-direction:column;}aside{width:100%;flex-direction:row;box-shadow:0 6px 22px #13262b33;padding-top:0;}.logo{margin:0; padding:17px 0;}}
    @media(max-width:610px){main{padding:12px 8vw 16px 8vw;} .login-card{padding:19px 6vw;}}
  </style>
</head>
<body>
  <div id="container">
    <aside>
      <div class="logo">🧬 HealthCare</div>
      <nav id="nav"></nav>
    </aside>
    <div class="main-wrap">
      <header class="top-bar" aria-label="계정">
        <div id="header-profile"></div>
      </header>
      <main id="main"></main>
    </div>
  </div>
  <div id="login-modal" style="display:none"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
