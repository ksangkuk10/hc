<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>HealthCare Service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"/>
  <style>
    /* CTKCLIP / K-뷰티 B2B 느낌: 크림·화이트·차콜·로즈·챔페인 골드 */
    :root {
      --ctk-ink: #1a1a1a;
      --ctk-body: #5a5a5a;
      --ctk-muted: #8a8580;
      --ctk-bg: #f7f5f2;
      --ctk-bg-deep: #efeae6;
      --ctk-surface: #ffffff;
      --ctk-line: #e8e2dc;
      --ctk-accent: #2c2c2c;
      --ctk-rose: #9a7b7b;
      --ctk-rose-soft: #c4a9a9;
      --ctk-gold: #b8956c;
      --ctk-gold-light: #d4c4a8;
      --ctk-tag-bg: #ebe6e1;
      --ctk-shadow: rgba(28, 24, 22, 0.06);
      --ctk-shadow-strong: rgba(28, 24, 22, 0.1);
    }
    body {
      min-height: 100vh;
      margin: 0;
      font-family: 'DM Sans', 'Apple SD Gothic Neo', 'Segoe UI', sans-serif;
      background: linear-gradient(165deg, var(--ctk-bg) 0%, var(--ctk-bg-deep) 45%, #e8e2dc 100%);
      color: var(--ctk-ink);
      display: flex;
      flex-direction: column;
    }
    #container {
      display: flex;
      height: 100vh;
    }
    aside {
      width: 220px;
      background: var(--ctk-surface);
      padding-top: 34px;
      box-shadow: 4px 0 32px var(--ctk-shadow);
      border-right: 1px solid var(--ctk-line);
      display: flex; flex-direction: column; align-items: stretch;
    }
    .logo {
      font-size: 1.15rem; font-weight: 700; margin-bottom: 36px; color: var(--ctk-ink);
      letter-spacing: 0.12em; text-align:center; padding:0 18px;
      text-transform: uppercase;
    }
    nav {
      display: flex; flex-direction: column; gap: 4px;
      padding: 0 10px;
    }
    nav button {
      background: transparent;
      color: var(--ctk-body);
      border: none;
      font-size: 0.95rem;
      text-align: left;
      padding: 12px 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, color 0.15s;
      display: flex; align-items: center; gap: 10px;
    }
    nav button:hover {
      background: var(--ctk-bg);
      color: var(--ctk-ink);
    }
    nav button:hover, nav .active {
      font-weight: 600;
    }
    nav .active {
      background: var(--ctk-accent);
      color: #fff;
    }
    .fa { min-width: 20px; opacity: 0.9; }
    .main-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 16px 7vw 0;
      min-height: 44px;
    }
    #header-profile { font-size: 0.95rem; color: var(--ctk-body); }
    .hp-name { margin-right: 8px; }
    .hp-btn {
      background: var(--ctk-surface);
      border: 1px solid var(--ctk-line);
      color: var(--ctk-ink);
      border-radius: 10px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 1.05rem;
      box-shadow: 0 1px 4px var(--ctk-shadow);
    }
    .hp-btn:hover { background: var(--ctk-bg); }
    main {
      flex:1;
      padding: 12px 7vw 28px 7vw;
      display: flex; flex-direction: column; align-items : stretch;
      overflow-y:auto;
      min-width: 0;
    }
    h2 { margin: 14px 0 6px 0; color: var(--ctk-ink); letter-spacing: -0.02em; font-weight: 700; }
    .card {
      background: var(--ctk-surface);
      border-radius: 14px;
      border: 1px solid var(--ctk-line);
      box-shadow: 0 4px 24px var(--ctk-shadow);
      padding: 22px 20px;
      margin-bottom: 14px;
      font-size: 1.02rem;
      color: var(--ctk-body);
    }
    #login-modal {
      position:fixed;left:0;top:0;width:100vw;height:100vh;z-index:99;
      display:flex;align-items:center;justify-content:center;
      background: rgba(32, 28, 26, 0.45);
      backdrop-filter: blur(6px);
      color: var(--ctk-ink);
    }
    .login-card {
      background: var(--ctk-surface);
      border-radius: 16px;
      padding: 42px 34px 36px 34px;
      box-shadow: 0 16px 48px var(--ctk-shadow-strong);
      text-align: center;
      width: 360px;
      max-width: 94vw;
      border: 1px solid var(--ctk-line);
    }
    .login-card input{
      width: 88%;
      font-size: 1rem;
      border-radius: 8px;
      padding: 12px 12px;
      margin-bottom: 12px;
      border: 1px solid var(--ctk-line);
      background: var(--ctk-bg);
      color: var(--ctk-ink);
      box-sizing: border-box;
    }
    .login-card input:focus {
      outline: none;
      border-color: var(--ctk-rose);
      box-shadow: 0 0 0 3px rgba(154, 123, 123, 0.15);
    }
    .login-card button{
      font-size: 1rem;
      background: var(--ctk-accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 0;
      width: 91%;
      margin-bottom: 8px;
      margin-top: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s, opacity 0.15s;
    }
    .login-card button:hover { opacity: 0.88; }
    .login-tabs { display: flex; gap: 8px; margin-bottom: 16px; justify-content: center; }
    .login-tabs button {
      flex: 1;
      background: var(--ctk-bg);
      color: var(--ctk-body);
      border: 1px solid var(--ctk-line);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      font-weight: 500;
    }
    .login-tabs button.active {
      background: var(--ctk-accent);
      color: #fff;
      border-color: var(--ctk-accent);
    }
    .muted { color: var(--ctk-muted); }
    .small { font-size: 0.92rem; }
    .section-label {
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--ctk-ink);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .dash-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-bottom: 14px; }
    .dash-grid.two { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .dash-recent-cond p,
    .dash-today-summary p { margin: 6px 0 0; line-height: 1.45; }
    .dash-recent-cond p:first-child,
    .dash-today-summary p:first-child { margin-top: 0; }
    .goal-row { margin-bottom: 14px; }
    .goal-title { font-weight: 600; margin-bottom: 4px; color: var(--ctk-ink); }
    .goal-meta { font-size: 0.85rem; color: var(--ctk-muted); margin-top: 4px; }
    .progress-outer { height: 8px; background: var(--ctk-bg-deep); border-radius: 6px; overflow: hidden; }
    .progress-inner {
      height: 100%;
      background: linear-gradient(90deg, var(--ctk-gold), var(--ctk-rose-soft));
      border-radius: 6px;
      transition: width 0.2s;
    }
    .rem-item { padding: 8px 0; border-bottom: 1px solid var(--ctk-line); }
    .rem-time { color: var(--ctk-gold); margin-right: 8px; font-weight: 600; }
    .quick-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .qa {
      padding: 11px 18px;
      border-radius: 10px;
      border: 1px solid var(--ctk-line);
      cursor: pointer;
      font-weight: 600;
      background: var(--ctk-surface);
      color: var(--ctk-ink);
      font-size: 0.95rem;
      box-shadow: 0 2px 8px var(--ctk-shadow);
    }
    .qa:hover { background: var(--ctk-bg); border-color: var(--ctk-rose-soft); }
    .form-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
    .form-table td:first-child { width: 140px; color: var(--ctk-body); }
    .form-table input {
      width: 100px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--ctk-line);
      background: var(--ctk-bg);
      color: var(--ctk-ink);
      font-size: 1rem;
    }
    .form-table input.wide { width: 100%; max-width: 320px; box-sizing: border-box; }
    .btn-primary {
      margin-top: 16px;
      padding: 10px 28px;
      background: var(--ctk-accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      margin-top: 10px;
      padding: 8px 20px;
      background: var(--ctk-surface);
      color: var(--ctk-ink);
      border: 1px solid var(--ctk-line);
      border-radius: 10px;
      cursor: pointer;
    }
    .btn-secondary:hover { background: var(--ctk-bg); }
    .hist-list { list-style: none; padding: 0; margin: 0; }
    .hist-list li { padding: 12px 0; border-bottom: 1px solid var(--ctk-line); }
    .answer { margin-top: 8px; padding: 10px; background: var(--ctk-bg); border-radius: 8px; border: 1px solid var(--ctk-line); }
    select, textarea.wide, input.wide {
      width: 100%; max-width: 420px; box-sizing: border-box;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid var(--ctk-line);
      background: var(--ctk-bg);
      color: var(--ctk-ink);
      margin-bottom: 10px;
      font-family: inherit;
    }
    textarea { min-height: 100px; resize: vertical; }
    label { display: block; margin-top: 8px; margin-bottom: 4px; color: var(--ctk-body); }
    .nav-logout {
      margin-top: 17px;
      background: var(--ctk-bg-deep) !important;
      color: var(--ctk-ink) !important;
      border: 1px solid var(--ctk-line) !important;
    }
    .nav-logout:hover { background: #e5dfda !important; }
    .consult-page {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }
    .consult-forms-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: stretch;
      width: 100%;
    }
    @media (max-width: 780px) {
      .consult-forms-row {
        grid-template-columns: 1fr;
      }
    }
    .consult-type-tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 6px;
      margin-right: 8px;
      vertical-align: middle;
    }
    .consult-type-tag.ai { background: var(--ctk-tag-bg); color: var(--ctk-rose); }
    .consult-type-tag.expert { background: var(--ctk-bg-deep); color: var(--ctk-body); }
    .consult-expert-query {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      margin-top: 4px;
    }
    .consult-expert-query textarea.wide {
      max-width: none;
      width: 100%;
      margin-bottom: 0;
    }
    .consult-expert .btn-consult-expert-submit {
      margin-top: 10px;
      align-self: flex-start;
    }
    textarea#ai-symptoms { width: 100%; max-width: none; box-sizing: border-box; min-height: 120px; }
    .cond-analyzing-banner {
      background: var(--ctk-bg);
      border: 1px dashed var(--ctk-rose-soft);
      color: var(--ctk-body);
    }
    .cond-camera-actions,
    .food-camera-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
      align-items: center;
    }
    .cond-camera-actions .btn-primary,
    .cond-camera-actions .btn-secondary,
    .food-camera-actions .btn-primary,
    .food-camera-actions .btn-secondary {
      margin-top: 0;
      min-height: 40px;
      padding: 0 20px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 600;
    }
    .contact-emergency-119 { padding: 8px 0 4px; }
    .contact-tel-big {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--ctk-ink);
      text-decoration: none;
      padding: 12px 18px;
      border-radius: 12px;
      border: 2px solid var(--ctk-line);
      background: var(--ctk-bg);
    }
    button.contact-tel-big {
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      font-size: 1.75rem;
    }
    .contact-tel-big:hover { background: var(--ctk-bg-deep); border-color: var(--ctk-rose-soft); }
    .contact-er-item { padding: 14px 0 !important; }
    .contact-er-phone a { font-size: 1.05rem; font-weight: 600; color: var(--ctk-rose); text-decoration: none; }
    .contact-er-phone a:hover { text-decoration: underline; }
    @media(max-width:810px){
      #container{flex-direction:column;}
      aside{width:100%;flex-direction:row;box-shadow:0 4px 24px var(--ctk-shadow);padding-top:0;border-right:none;border-bottom:1px solid var(--ctk-line);}
      .logo{margin:0; padding:17px 0;}
    }
    @media(max-width:610px){main{padding:12px 8vw 16px 8vw;} .login-card{padding:19px 6vw;}}
  </style>
</head>
<body>
  <div id="container">
    <aside>
      <div class="logo">HealthCare</div>
      <nav id="nav"></nav>
    </aside>
    <div class="main-wrap">
      <header class="top-bar" aria-label="계정">
        <div id="header-profile"></div>
      </header>
      <main id="main"></main>
    </div>
  </div>
  <div id="login-modal" style="display:none"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
